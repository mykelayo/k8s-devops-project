name: CI Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: ${{ vars.ECR_BACKEND_NAME }}
  ECR_REPOSITORY_FRONTEND: ${{ vars.ECR_FRONTEND_NAME }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.2'

    - name: Install dependencies
      run: |
        cd app/backend
        pip install -r requirements.txt
        pip install pytest pytest-cov ruff

    - name: Lint
      run: |
        cd app/backend
        ruff check .

    - name: Run tests
      run: |
        cd app/backend
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Scan Dockerfile for misconfigurations
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: config
        scan-ref: app/backend/Dockerfile
        severity: HIGH,CRITICAL

    - name: Scan Python dependencies
      run: |
        cd app/backend
        pip install pip-audit
        pip-audit -r requirements.txt --skip-editable

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install kustomize
      run: |
        curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
        sudo mv kustomize /usr/local/bin/

    - name: Validate dev overlay
      run: |
        kustomize build kubernetes/overlays/dev > /dev/null
        echo "Dev overlay valid."

    - name: Validate prod overlay
      run: |
        kustomize build kubernetes/overlays/prod > /dev/null
        echo "Prod overlay valid."

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan, validate-manifests]
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./app/backend
        push: true
        tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Scan backend image for CVEs
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: image
        image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
        severity: HIGH,CRITICAL
        exit-code: '1'
        trivyignore-file: .trivyignore

    - name: Scan frontend image for CVEs
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: image
        image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
        severity: HIGH,CRITICAL
        exit-code: '1'
        trivyignore-file: .trivyignore

    - name: Update image tags in Kustomize overlay
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        SHA: ${{ github.sha }}
      run: |
        cd kubernetes/overlays/dev
        kustomize edit set image \
          REGISTRY/devops-project-backend=${REGISTRY}/${{ env.ECR_REPOSITORY_BACKEND }}:${SHA}
        kustomize edit set image \
          REGISTRY/devops-project-frontend=${REGISTRY}/${{ env.ECR_REPOSITORY_FRONTEND }}:${SHA}

    - name: Commit and push manifest updates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git stash --include-untracked || true
        git pull --rebase origin main
        git stash pop || true
        git add kubernetes/overlays/dev/kustomization.yaml
        git diff --cached --quiet && echo "No changes to commit." && exit 0
        git commit -m "ci: update image tags to ${{ github.sha }}"
        git push