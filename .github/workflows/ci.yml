name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: ${{ vars.ECR_BACKEND_NAME }}
  ECR_REPOSITORY_FRONTEND: ${{ vars.ECR_FRONTEND_NAME }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.2'

    - name: Install dependencies
      run: |
        cd app/backend
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run unit tests with coverage
      run: |
        cd app/backend
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Scan Dockerfile for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: config
        scan-ref: app/backend/Dockerfile
        severity: HIGH,CRITICAL

    - name: Scan Python dependencies
      run: |
        cd app/backend
        pip install pip-audit
        pip-audit -r requirements.txt --skip-editable

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./app/backend
        push: true
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Update image tags in Kustomize overlay
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        SHA: ${{ github.sha }}
      run: |
        curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
        sudo mv kustomize /usr/local/bin/
        cd kubernetes/overlays/dev

        kustomize edit set image \
          REGISTRY/devops-project-backend=${REGISTRY}/${{ env.ECR_REPOSITORY_BACKEND }}:${SHA}

        kustomize edit set image \
          REGISTRY/devops-project-frontend=${REGISTRY}/${{ env.ECR_REPOSITORY_FRONTEND }}:${SHA}

        # Verify the output looks correct before committing
        echo "--- kustomize build preview (first 40 lines) ---"
        kustomize build . | head -40

    - name: Commit and push manifest updates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add kubernetes/overlays/dev/kustomization.yaml
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        git pull --rebase origin ${{ github.ref_name }}
        git push
        git commit -m "Updated image tags to ${{ github.sha }}"