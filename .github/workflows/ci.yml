name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: devops-project-backend
  ECR_REPOSITORY_FRONTEND: devops-project-frontend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd app/backend
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run unit tests with coverage
      run: |
        cd app/backend
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./app/backend/coverage.xml
        fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Scan Dockerfile for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: config
        scan-ref: app/backend/Dockerfile
        severity: HIGH,CRITICAL

    - name: Scan Python dependencies
      run: |
        cd app/backend
        pip install safety
        safety check -r requirements.txt --full-report || true  # Don't fail on warnings

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./app/backend
        push: true
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}

    - name: Update Kubernetes manifests
      run: |
        # Update image tags in kustomization.yaml
        sed -i "s|newTag:.*|newTag: ${{ github.sha }}|g" kubernetes/overlays/dev/kustomization.yaml
        # Update base deployment if needed
        sed -i "s|:latest|:${{ github.sha }}|g" kubernetes/base/deployment-backend.yaml
        sed -i "s|:latest|:${{ github.sha }}|g" kubernetes/base/deployment-frontend.yaml

    - name: Commit and push manifest updates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add kubernetes/overlays/dev/kustomization.yaml
        git add kubernetes/base/deployment-backend.yaml
        git add kubernetes/base/deployment-frontend.yaml
        git diff --staged --quiet || git commit -m "Update image tags to ${{ github.sha }}"
        git push