apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-app

resources:
- namespace.yaml
- configmap.yaml
- secret.yaml
- deployment-backend.yaml
- deployment-frontend.yaml
- service-backend.yaml
- service-frontend.yaml
- ingress.yaml
- hpa.yaml

images:
- name: ${ECR_URL}/devops-project-backend
  newName: ${ECR_URL}/devops-project-backend
  newTag: latest
- name: ${ECR_URL}/devops-project-frontend
  newName: ${ECR_URL}/devops-project-frontend
  newTag: latest

commonLabels:
  managed-by: kustomize
  environment: base