apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-app

resources:
- ../../base

patches:
- path: replica-count.yaml
- path: configmap-patch.yaml

images:
- name: ${ECR_URL}/devops-project-backend
  newName: ${ECR_URL}/devops-project-backend
  newTag: dev-latest
- name: ${ECR_URL}/devops-project-frontend
  newName: ${ECR_URL}/devops-project-frontend
  newTag: dev-latest

commonLabels:
  environment: dev